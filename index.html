<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고등 Basic 27강 - 혼동어휘 & 다의어 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 기본 폰트 및 앱 스타일 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; overflow-x: hidden; color: #f8fafc; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 부드러운 아코디언 애니메이션 */
        .accordion-content { transition: max-height 0.35s ease-in-out, padding 0.35s ease-in-out, opacity 0.35s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 400px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem; }
        
        /* 카드 뒤집기 3D 애니메이션 */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        /* 모바일 앱 컨테이너 제어 */
        .app-container { max-width: 480px; margin: 0 auto; background-color: #1e293b; min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* 다의어/혼동어 포인트 하이라이트 */
        .highlight-amber { color: #f59e0b; font-weight: 700; }
    </style>
</head>
<body>

<div class="app-container flex flex-col h-screen overflow-hidden">
    
    <!-- Header -->
    <header class="bg-slate-900 text-slate-100 p-5 sticky top-0 z-20 flex justify-between items-center shadow-lg border-b border-slate-700">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight"><i class="fa-solid fa-bolt text-amber-500 mr-2"></i>메타인지 단어장</h1>
            <p class="text-xs text-slate-400 mt-1">고등 Basic 27강 <span class="highlight-amber">혼동어휘 & 다의어</span></p>
        </div>
        <button onclick="toggleMode()" id="modeToggleBtn" class="bg-amber-500 text-slate-900 px-4 py-2 rounded-full text-sm font-bold shadow-md hover:bg-amber-400 transition">
            <i class="fa-solid fa-clone mr-1"></i> 카드모드
        </button>
    </header>

    <!-- Main Content Area (List Mode) -->
    <main id="listView" class="flex-1 overflow-y-auto p-4 space-y-5 pb-24 bg-slate-800">
        <!-- 콘텐츠는 JavaScript로 렌더링됩니다 -->
    </main>

    <!-- Flashcard Mode (Hidden by default) -->
    <div id="flashcardView" class="hidden absolute inset-0 bg-slate-900 z-30 flex-col pb-10">
        <!-- 헤더 -->
        <div class="flex justify-between items-center p-5 text-white">
            <span id="flashcardCounter" class="text-sm font-bold bg-slate-700 px-4 py-1.5 rounded-full border border-slate-600 text-amber-400">1 / 40</span>
            <button onclick="toggleMode()" class="text-slate-400 hover:text-amber-400 transition transform hover:rotate-90"><i class="fa-solid fa-xmark text-3xl"></i></button>
        </div>

        <!-- 카드 영역 -->
        <div class="flex-1 flex items-center justify-center p-6 w-full perspective-1000">
            <div id="flashcard" class="w-full h-[65vh] max-w-sm relative transform-style-3d flip-card-inner cursor-pointer" onclick="flipCard()">
                
                <!-- 앞면 (단어) -->
                <div class="absolute inset-0 w-full h-full bg-slate-800 rounded-3xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] backface-hidden flex flex-col justify-center items-center p-8 text-center border-t-4 border-amber-500">
                    <span id="cardGroup" class="absolute top-6 text-[0.7rem] font-bold text-slate-900 bg-amber-500 px-3 py-1 rounded-md tracking-wider">그룹</span>
                    <h2 id="cardWord" class="text-4xl font-black text-slate-100 mb-4 tracking-tight break-words">Word</h2>
                    <p class="text-slate-400 text-sm mt-6 font-semibold animate-pulse"><i class="fa-solid fa-rotate mr-2"></i>카드를 뒤집어 해설 확인</p>
                </div>

                <!-- 뒷면 (뜻, 어원, 동계어) -->
                <div class="absolute inset-0 w-full h-full bg-slate-700 rounded-3xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] backface-hidden rotate-y-180 flex flex-col p-6 text-slate-200 overflow-y-auto border-t-4 border-emerald-400">
                    <h2 id="cardWordBack" class="text-2xl font-bold mb-2 border-b border-slate-500 pb-2 text-amber-400">Word</h2>
                    <p id="cardMeaning" class="text-xl font-black mb-5 text-slate-100">의미</p>
                    
                    <div class="bg-slate-800 rounded-xl p-4 mb-4 shadow-inner border border-slate-600">
                        <p class="text-[0.7rem] text-emerald-400 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-lightbulb mr-1"></i> 메타인지 해설 (Semantic Shift)</p>
                        <p id="cardRoot" class="text-[0.9rem] leading-relaxed text-slate-300 font-medium break-keep">어원 설명</p>
                    </div>
                    
                    <div class="bg-slate-800 rounded-xl p-4 shadow-inner border border-slate-600">
                        <p class="text-[0.7rem] text-sky-400 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-link mr-1"></i> 동계어 (Family)</p>
                        <p id="cardCognates" class="text-sm font-medium text-slate-400">동계어 설명</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 네비게이션 컨트롤 -->
        <div class="flex justify-center items-center space-x-8 px-6 pb-4">
            <button onclick="prevCard()" class="w-16 h-16 rounded-full bg-slate-800 text-slate-300 flex justify-center items-center active:bg-slate-600 hover:bg-slate-700 transition shadow-lg border border-slate-600 hover:text-amber-400">
                <i class="fa-solid fa-chevron-left text-2xl"></i>
            </button>
            <button onclick="nextCard()" class="w-16 h-16 rounded-full bg-amber-500 text-slate-900 flex justify-center items-center active:bg-amber-400 hover:bg-amber-400 transition shadow-[0_0_20px_rgba(245,158,11,0.3)] font-bold">
                <i class="fa-solid fa-chevron-right text-2xl"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // 고등 Basic 27강 40단어 (혼동어휘, 다의어 완벽 분석)
    const db = [
        // 그룹 1: 철자가 비슷해 헷갈리는 혼동어휘 1
        { word: "principal", meaning: "주요한, 주된; 교장", root: "[암기팁] pal(친구)로 끝남! -> 학교에서 으뜸가는(prim) 친구(pal)는 '교장선생님'.", cognates: "prime(주요한), primary(첫째의)", group: "1. 헷갈리는 철자 (혼동어휘)" },
        { word: "principle", meaning: "원리, 원칙", root: "[암기팁] ple(규칙)로 끝남! -> 세상이 돌아가는 첫 번째(prim) 법칙이나 '원리(rule/ple)'.", cognates: "principal(주요한, 교장)", group: "1. 헷갈리는 철자 (혼동어휘)" },
        { word: "compliment", meaning: "칭찬, 칭찬하다", root: "[암기팁] i 가 들어감! -> 'I(나)를 칭찬해줘!' 상대방의 기분을 완전(com) 채워(pli)주는 말.", cognates: "comply(따르다)", group: "1. 헷갈리는 철자 (혼동어휘)" },
        { word: "complement", meaning: "보완, 보충, 보완하다", root: "[암기팁] e 가 들어감! -> 부족함을 완전하게(com) 채워주는(ple) 요소(element).", cognates: "complete(완성하다), plenty(풍부함)", group: "1. 헷갈리는 철자 (혼동어휘)" },
        { word: "successful", meaning: "성공적인", root: "suc(아래에서) + cess(가다) + ful(가득찬) -> 목표를 향해 끝까지 나아가 결과가 꽉 찬(성공적인).", cognates: "success(성공), succeed(성공하다)", group: "1. 헷갈리는 철자 (혼동어휘)" },
        { word: "successive", meaning: "잇따른, 연속하는", root: "suc(아래에서) + cess(가다) + ive -> 왕위나 자리를 아래에서부터 위로 계속 이어받아 '연속하는'.", cognates: "succession(연속, 계승)", group: "1. 헷갈리는 철자 (혼동어휘)" },
        { word: "cooperation", meaning: "협력, 협동", root: "co(함께) + oper(일하다) + ation -> 너와 내가 힘을 합쳐 함께 일하는 '협력'.", cognates: "operate(작동하다, 수술하다)", group: "1. 헷갈리는 철자 (혼동어휘)" },
        { word: "corporation", meaning: "기업, 회사, 법인, 조합", root: "corpor(몸, 단체) + ation -> 수많은 사람들이 모여 법적으로 하나의 몸통(단체)을 이룬 '기업'.", cognates: "corpse(시체), incorporate(포함하다)", group: "1. 헷갈리는 철자 (혼동어휘)" },

        // 그룹 2: 철자가 비슷해 헷갈리는 혼동어휘 2
        { word: "initiate", meaning: "시작하다, 개시하다", root: "in(안으로) + it(가다) + ate -> 처음으로 어떤 일의 영역 안으로 발을 들이며 '시작하다'.", cognates: "initial(처음의), exit(출구 - 밖으로 가다)", group: "2. 헷갈리는 철자 (혼동어휘)" },
        { word: "imitate", meaning: "모방하다, 흉내 내다", root: "imago(이미지) + ate -> 남의 행동이나 이미지를 사진 찍듯 그대로 따라 하며 '흉내 내다'.", cognates: "image(이미지), imitation(모조품)", group: "2. 헷갈리는 철자 (혼동어휘)" },
        { word: "absorb", meaning: "흡수하다; (마음을) 빼앗다", root: "ab(멀리) + sorb(빨아들이다) -> 스폰지가 물을 쏙 빨아들이듯, 지식이나 관심을 완전히 '흡수하다'.", cognates: "absorption(흡수)", group: "2. 헷갈리는 철자 (혼동어휘)" },
        { word: "absurd", meaning: "터무니없는, 불합리한", root: "ab(강조) + surd(귀머거리의) -> 남의 말을 전혀 안 듣는 꽉 막힌 사람처럼, 이치에 안 맞고 '터무니없는'.", cognates: "surd(무리수 - 수학용어)", group: "2. 헷갈리는 철자 (혼동어휘)" },
        { word: "carve", meaning: "조각하다, 썰다", root: "고대 영어 ceorfan(자르다) -> 나무나 돌의 표면을 칼로 파내고 잘라서 모양을 '조각하다'.", cognates: "carving(조각품)", group: "2. 헷갈리는 철자 (혼동어휘)" },
        { word: "curve", meaning: "곡선, 커브", root: "라틴어 curvus(구부러진) -> 직선이 아니라 활처럼 둥글게 구부러진 '곡선'.", cognates: "curvature(곡률)", group: "2. 헷갈리는 철자 (혼동어휘)" },
        { word: "flame", meaning: "불꽃, 화염", root: "라틴어 flamma(불꽃) -> 활활 타오르는 '불꽃'.", cognates: "flammable(가연성의)", group: "2. 헷갈리는 철자 (혼동어휘)" },
        { word: "frame", meaning: "뼈대, 틀, 액자", root: "고대 영어 framian(만들다) -> 어떤 물건을 지탱하기 위해 쓸모 있게 짜 맞춘 '뼈대'나 '틀'.", cognates: "framework(체제, 뼈대)", group: "2. 헷갈리는 철자 (혼동어휘)" },

        // 그룹 3: 뜻을 구별해야 하는 3형제 단어들
        { word: "inquire", meaning: "묻다, 조사하다", root: "in(안으로) + quir(구하다) -> 궁금증을 해결하기 위해 사건의 안쪽을 깊이 파고들며 '질문하다'.", cognates: "require, acquire", group: "3. 모양이 비슷한 핵심 동사" },
        { word: "acquire", meaning: "얻다, 획득하다, 습득하다", root: "ad(~쪽으로) + quir(구하다) -> 내가 원하는 물건이나 지식 쪽으로 손을 뻗어 내 것으로 '획득하다'.", cognates: "inquire, require", group: "3. 모양이 비슷한 핵심 동사" },
        { word: "require", meaning: "필요로 하다, 요구하다", root: "re(다시/강하게) + quir(구하다) -> 어떤 목적을 위해 계속해서 내놓으라고 강하게 '요구하다'.", cognates: "inquire, acquire", group: "3. 모양이 비슷한 핵심 동사" },
        { word: "respectable", meaning: "존경할 만한", root: "respect(존경하다) + able(할 수 있는) -> 훌륭한 인품을 가져서 남들로부터 존경받을 '자격이 있는'.", cognates: "respect(존경), respectful(공손한)", group: "3. 모양이 비슷한 핵심 동사" },
        { word: "respective", meaning: "각각의", root: "respect(주의, 개별성) + ive -> 전체를 뭉뚱그리지 않고, 구성원 하나하나를 따로따로 뒤돌아보는 '각각의'.", cognates: "respectively(각각, 제각기)", group: "3. 모양이 비슷한 핵심 동사" },
        { word: "lie (1)", meaning: "눕다, 놓여 있다 (lie-lay-lain)", root: "자동사(목적어X). 땅바닥에 내 몸이 스스로 평평하게 뻗어 '눕다'.", cognates: "layer(층 - 놓인 것)", group: "3. 모양이 비슷한 핵심 동사" },
        { word: "lay", meaning: "놓다, 두다, (알을) 낳다 (lay-laid-laid)", root: "타동사(목적어O). 물건이나 아기(알)를 바닥에 조심스럽게 '내려놓다'.", cognates: "lie (눕다)", group: "3. 모양이 비슷한 핵심 동사" },
        { word: "lie (2)", meaning: "거짓말하다, 거짓말 (lie-lied-lied)", root: "진실이 아닌 말을 꾸며서 '거짓말하다'. (눕다 lie와 철자는 같지만 어원이 다른 단어)", cognates: "liar(거짓말쟁이)", group: "3. 모양이 비슷한 핵심 동사" },

        // 그룹 4: 문맥에 따라 휙휙 바뀌는 다의어 1
        { word: "present", meaning: "선물; 현재; 참석한; 수여하다", root: "pre(앞에) + sent(존재하다) -> 1. 내 앞의 시간(현재) 2. 내 앞에 있는 사람(참석한) 3. 내 앞에 놓아주는 것(선물).", cognates: "presence(존재, 참석)", group: "4. 얼굴이 여러 개인 다의어 1" },
        { word: "subject", meaning: "주제, 과목; 피실험자; ~될 수 있는", root: "sub(아래에) + ject(던지다) -> 실험이나 토론을 위해 내 아래에 던져진 연구 대상(주제/피실험자).", cognates: "reject(거절하다), object(물건, 반대하다)", group: "4. 얼굴이 여러 개인 다의어 1" },
        { word: "sound", meaning: "소리; ~처럼 들리다; 건전한, 푹", root: "어원 1: sonus(소리) -> 듣는 소리. \n어원 2: sund(건강한) -> 흔들림 없이 '건전한', 깊고 튼튼하게(푹) 자는 상태.", cognates: "sonar(수중 음파 탐지기)", group: "4. 얼굴이 여러 개인 다의어 1" },
        { word: "character", meaning: "성격, 특징, 등장인물, 글자", root: "char(새기다) -> 돌에 깊이 파서 새긴 '글자'처럼, 사람의 마음이나 행동에 지워지지 않게 새겨진 고유한 '성격'.", cognates: "characteristic(특징)", group: "4. 얼굴이 여러 개인 다의어 1" },
        { word: "bill", meaning: "청구서, 계산서, 지폐, 법안, 부리", root: "bulla(둥근 도장) -> 도장이 쾅 찍힌 공식 문서(청구서/법안). '부리'는 새의 뾰족한 입을 뜻하는 별개의 어원.", cognates: "bulletin(게시), bullet(총알)", group: "4. 얼굴이 여러 개인 다의어 1" },
        { word: "contract", meaning: "계약(서); 수축하다; 병에 걸리다", root: "con(함께) + tract(끌다) -> 1. 마음을 끌어 맺는 '계약' 2. 크기가 확 끌어당겨짐 '수축' 3. 병균을 끌어당김 '감염'.", cognates: "attract(끌어당기다), tractor(트랙터)", group: "4. 얼굴이 여러 개인 다의어 1" },
        { word: "bear", meaning: "참다, 견디다; 낳다; (책임을) 지다", root: "고대 영어 beran(나르다) -> 1. 무거운 짐을 몸에 지고 나르다(참다/책임지다). 2. 아이를 품고 있다가 밖으로 나르다(낳다).", cognates: "birth(탄생), burden(짐)", group: "4. 얼굴이 여러 개인 다의어 1" },
        { word: "count", meaning: "세다, 계산하다; 중요하다, 간주하다", root: "com(함께) + put(생각하다/계산하다) -> 숫자를 세다. 일부러 숫자를 '세어볼 만큼 가치가 있고 중요하다'.", cognates: "computer(컴퓨터), account(계좌, 설명)", group: "4. 얼굴이 여러 개인 다의어 1" },

        // 그룹 5: 문맥에 따라 휙휙 바뀌는 다의어 2 및 숙어
        { word: "draw", meaning: "그리다, 끌어당기다, (결론을) 도출하다", root: "drag(끌다)와 동일 어원 -> 붓이나 연필을 쭉 끌어서 '그리다', 관심이나 결론을 내 쪽으로 '끌어당기다'.", cognates: "drag(끌다), drawer(서랍 - 당겨 여는 것)", group: "5. 얼굴이 여러 개인 다의어 2" },
        { word: "hold", meaning: "잡고 있다; 개최하다; 수용하다", root: "손으로 꽉 쥐다 -> 어떤 행사나 통제권을 내 손안에 쥐고 있다(개최하다), 그릇 안에 쥐고 있다(수용하다).", cognates: "behold(바라보다), uphold(유지하다)", group: "5. 얼굴이 여러 개인 다의어 2" },
        { word: "grave", meaning: "무덤; 심각한, 중대한", root: "어원 1: græf(파낸 곳) -> 시체를 묻는 '무덤'. \n어원 2: gravis(무거운) -> 분위기가 무겁고 '심각한'.", cognates: "gravity(중력, 심각성), engrave(새기다)", group: "5. 얼굴이 여러 개인 다의어 2" },
        { word: "balance", meaning: "균형, 잔고", root: "bi(둘) + lanx(접시) -> 양팔 저울의 두 접시. 저울이 평형을 이룬 '균형', 쓴 돈과 남은 돈의 차이인 통장 '잔고'.", cognates: "scale(저울 - 연관어)", group: "5. 얼굴이 여러 개인 다의어 2" },
        { word: "defect", meaning: "결함, 결점", root: "de(떨어져) + fect(만들다) -> 공장에서 물건을 만들 때, 부품 하나가 뚝 떨어져 나가서 생긴 치명적인 '결함'.", cognates: "factory(공장), perfect(완벽한)", group: "5. 얼굴이 여러 개인 다의어 2" },
        { word: "defeat", meaning: "패배시키다, 무찌르다; 패배", root: "de(반대로) + feat(행하다) -> 상대방이 이룩해 놓은 성과(feat)를 완전히 부수고 뒤집어버려 '패배시키다'.", cognates: "feature(특징), feat(위업, 솜씨)", group: "5. 얼굴이 여러 개인 다의어 2" },
        { word: "demand", meaning: "~을 요구[요청]하다, 필요로 하다", root: "de(완전히) + mand(명령하다) -> 상대에게 '내 권리이니 당장 내놓으라'고 강하게 명령하며 '요구하다'.", cognates: "command(명령하다), mandatory(의무적인)", group: "5. 얼굴이 여러 개인 다의어 2" },
        { word: "call off", meaning: "취소하다", root: "call(부르다) + off(떨어져) -> 일하고 있는 사람을 불러서 일터에서 떨어지게(off) 하다 -> 약속이나 일을 '취소하다'.", cognates: "call(부르다), off(분리)", group: "5. 얼굴이 여러 개인 다의어 2" }
    ];

    let currentCardIndex = 0;
    let isFlipped = false;

    function renderList() {
        const listView = document.getElementById('listView');
        let htmlContent = '';
        
        // 그룹핑 로직
        const groupedData = db.reduce((acc, word) => {
            if (!acc[word.group]) acc[word.group] = [];
            acc[word.group].push(word);
            return acc;
        }, {});

        // 절대 카운터를 사용하여 모든 아코디언 요소가 100% 고유한 ID를 갖도록 보장 (버그 해결)
        let absoluteCounter = 0;

        for (const [groupName, groupWords] of Object.entries(groupedData)) {
            htmlContent += `
                <div class="mb-8">
                    <h2 class="text-[0.95rem] font-bold text-amber-500 uppercase tracking-widest mb-4 px-2 border-l-4 border-amber-500 pl-3">
                        ${groupName}
                    </h2>
                    <div class="space-y-3">
            `;
            
            groupWords.forEach((item) => {
                const id = `word-${absoluteCounter++}`;
                
                htmlContent += `
                    <div class="bg-slate-700 rounded-xl shadow-lg border border-slate-600 overflow-hidden transform transition hover:scale-[1.01]">
                        <div class="p-4.5 flex justify-between items-center cursor-pointer hover:bg-slate-600 transition" onclick="toggleAccordion('${id}')">
                            <div class="pl-2">
                                <h3 class="text-[1.15rem] font-extrabold text-slate-100">${item.word}</h3>
                                <p class="text-[0.9rem] text-slate-400 mt-1 font-medium">${item.meaning}</p>
                            </div>
                            <div class="text-amber-500 w-10 h-10 flex items-center justify-center bg-slate-800 rounded-full shadow-inner border border-slate-600 mr-2">
                                <i id="icon-${id}" class="fa-solid fa-chevron-down transition-transform duration-300 text-sm"></i>
                            </div>
                        </div>
                        
                        <div id="content-${id}" class="accordion-content bg-slate-800 px-5 border-t border-slate-600">
                            <div class="mb-4">
                                <span class="inline-block bg-emerald-900/40 text-emerald-400 text-[0.75rem] px-2.5 py-1 rounded-md font-bold mb-2 border border-emerald-800/50">
                                    <i class="fa-solid fa-lightbulb mr-1"></i>메타인지 어원
                                </span>
                                <p class="text-[0.9rem] text-slate-300 leading-relaxed font-medium break-keep">${item.root}</p>
                            </div>
                            <div class="pb-3">
                                <span class="inline-block bg-sky-900/40 text-sky-400 text-[0.75rem] px-2.5 py-1 rounded-md font-bold mb-1 border border-sky-800/50">
                                    <i class="fa-solid fa-link mr-1"></i>동계어 (Family)
                                </span>
                                <p class="text-[0.85rem] text-slate-400 font-semibold">${item.cognates}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div></div>`;
        }
        listView.innerHTML = htmlContent;
        updateFlashcard();
    }

    function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.classList.remove('rotate-180');
        } else {
            content.classList.add('open');
            icon.classList.add('rotate-180');
        }
    }

    function toggleMode() {
        const listView = document.getElementById('listView');
        const flashcardView = document.getElementById('flashcardView');
        const modeBtn = document.getElementById('modeToggleBtn');
        
        if (flashcardView.classList.contains('hidden')) {
            flashcardView.classList.remove('hidden');
            flashcardView.classList.add('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-list mr-1"></i> 목록보기';
            updateFlashcard();
        } else {
            flashcardView.classList.add('hidden');
            flashcardView.classList.remove('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-clone mr-1"></i> 카드모드';
        }
    }

    function updateFlashcard() {
        const item = db[currentCardIndex];
        
        // 플래시카드 그룹명에서 번호 제거하여 깔끔하게 표시
        let cleanGroupName = item.group.split('. ')[1] || item.group;
        
        document.getElementById('cardGroup').innerText = cleanGroupName;
        document.getElementById('cardWord').innerText = item.word;
        document.getElementById('cardWordBack').innerText = item.word;
        document.getElementById('cardMeaning').innerText = item.meaning;
        document.getElementById('cardRoot').innerText = item.root;
        document.getElementById('cardCognates').innerText = item.cognates;
        
        document.getElementById('flashcardCounter').innerText = `${currentCardIndex + 1} / ${db.length}`;
        
        if(isFlipped) {
            document.getElementById('flashcard').classList.remove('rotate-y-180');
            isFlipped = false;
        }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        isFlipped = !isFlipped;
        if (isFlipped) {
            card.classList.add('rotate-y-180');
        } else {
            card.classList.remove('rotate-y-180');
        }
    }

    function prevCard() {
        currentCardIndex = (currentCardIndex > 0) ? currentCardIndex - 1 : db.length - 1;
        updateFlashcard();
    }

    function nextCard() {
        currentCardIndex = (currentCardIndex < db.length - 1) ? currentCardIndex + 1 : 0;
        updateFlashcard();
    }

    // 앱 실행
    window.onload = () => {
        renderList();
    };
</script>
</body>
</html>
