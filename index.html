      { id: 56, word: "identical", meaning: "동일한, 일치하는", prefix: "idem (바로 그것, 똑같은 것)", root: "identicus (중세 라틴어: 구별점이 없이 완벽히 일치하는)", story: "두 개의 대상을 눈앞에 두고 아무리 비교해 보아도 겉모습이나 본질에서 털끝만큼의 차이도 찾아낼 수 없는 일란성 쌍둥이 같은 상태입니다.", related: "identity (정체성), identify (확인하다, 동일시하다)" },
      { id: 57, word: "reinforce", meaning: "강화하다, 증강하다, 보강하다", prefix: "re- (다시) + in- (안으로) + force (강력한 힘)", root: "renforcer (프랑스어: 허술한 성벽 내부에 힘을 다시 불어넣다)", story: "무너지기 직전의 연약한 뼈대나 적군에게 밀리는 군대 안으로(in) 강인한 아군 자원과 힘을 다시(re) 쏟아부어 견고하게 다지는 공정입니다.", related: "force (힘), enforce (집행하다), forceful (강력한)" },

    function App() {
      const [activeTab, setActiveTab] = useState("list"); // list 또는 card
      const [currentIndex, setCurrentIndex] = useState(0);
      const [searchQuery, setSearchQuery] = useState("");
      const [bookmarked, setBookmarked] = useState(new Set());
      const [memorized, setMemorized] = useState(new Set());
      const [showMeaning, setShowMeaning] = useState(true);
      const [filterMode, setFilterMode] = useState("all");
      const [isPlaying, setIsPlaying] = useState(false);
      const [speechRate, setSpeechRate] = useState(0.9);
      const autoPlayTimer = useRef(null);

      // 영어 발음 청취 TTS
      const playPronunciation = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const clean = text.replace(/-ing/g, '').trim();
          const u = new SpeechSynthesisUtterance(clean);
          u.lang = 'en-US'; u.rate = speechRate;
          window.speechSynthesis.speak(u);
        }
      };

      // 한국어 뜻 청취 TTS
      const playMeaning = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const clean = text.replace(/[\(\)·\[\]~]/g,'');
          const u = new SpeechSynthesisUtterance(clean);
          u.lang = 'ko-KR'; u.rate = 1.0;
          window.speechSynthesis.speak(u);
        }
      };

      // 필터 및 검색 처리
      const filteredWords = useMemo(() => {
        return WORDS.filter(item => {
          const q = searchQuery.toLowerCase();
          const match = item.word.toLowerCase().includes(q) || 
                        item.meaning.includes(searchQuery) ||
                        (item.related && item.related.toLowerCase().includes(q)) ||
                        (item.root && item.root.toLowerCase().includes(q));
          if (!match) return false;
          if (filterMode === "bookmarked") return bookmarked.has(item.id);
          if (filterMode === "not_memorized") return !memorized.has(item.id);
          return true;
        });
      }, [searchQuery, filterMode, bookmarked, memorized]);

      const currentWord = filteredWords[currentIndex] || filteredWords[0] || null;

      const handleNext = () => {
        if (!filteredWords.length) return;
        setCurrentIndex(p => (p + 1) % filteredWords.length);
        setShowMeaning(true);
      };

      const handlePrev = () => {
        if (!filteredWords.length) return;
        setCurrentIndex(p => (p - 1 + filteredWords.length) % filteredWords.length);
        setShowMeaning(true);
      };

      useEffect(() => {
        setCurrentIndex(0); setShowMeaning(true);
      }, [filterMode, searchQuery]);

      // 데스크톱 키보드 단축키 호환 바인딩
      useEffect(() => {
        const handler = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
          if (e.key === 'ArrowRight') handleNext();
          else if (e.key === 'ArrowLeft') handlePrev();
          else if (e.key === ' ') { e.preventDefault(); setShowMeaning(p => !p); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [currentIndex, filteredWords]);

      // 자동 스트리밍 학습 타이머 동작
      useEffect(() => {
        if (isPlaying && currentWord) {
          playPronunciation(currentWord.word);
          autoPlayTimer.current = setTimeout(() => {
            if (showMeaning) playMeaning(currentWord.meaning);
            autoPlayTimer.current = setTimeout(handleNext, 4200);
          }, 1800);
        }
        return () => clearTimeout(autoPlayTimer.current);
      }, [isPlaying, currentIndex, currentWord, showMeaning]);

      const toggleBookmark = (id) => setBookmarked(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
      const toggleMemorized = (id) => setMemorized(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });

      return (
        <div class="h-screen flex flex-col bg-[#0b0f19] text-slate-200 select-none overflow-hidden">
          
          {/* TOP HEADER */}

            <div class="absolute inset-x-0 top-0 h-1 stripe-blue"></div>
            <div class="flex items-center justify-between">

          </div>

          {/* MAIN CONTENTS CONTAINER */}
          <div class="flex-1 overflow-hidden relative bg-[#0b0f19]">
            
            {/* 1. LIST VIEW TAB */}
            {activeTab === "list" && (

                {/* Filters */}
                <div class="p-2 bg-[#0e1526] border-b border-slate-800/50 grid grid-cols-3 gap-1">
                  {[["all","전체","text-slate-300"],["bookmarked","★ 북마크","text-amber-400"],["not_memorized","미암기","text-sky-400"]].map(([mode, label, color]) => (
                    <button key={mode} onClick={() => setFilterMode(mode)}
                      class={`py-1.5 text-xs rounded-lg font-medium transition-all ${filterMode === mode ? "bg-sky-950/40 border border-sky-500/50 " + color : "text-slate-500 hover:bg-slate-900"}`}>
                      {label}
                    </button>
                  ))}
                </div>

                {/* Search Bar */}
                <div class="p-2 bg-[#0b0f19] border-b border-slate-900 relative">
                  <input type="text" placeholder="단어·뜻·어근·동계어 입체 검색..."
                    value={searchQuery}
                    onChange={e => setSearchQuery(e.target.value)}
                    class="w-full pl-8 pr-3 py-1.5 bg-[#131b2e] border border-slate-800 rounded-lg text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-sky-500 transition-colors"
                  />
                  <span class="absolute left-4 top-3.5 text-slate-600 text-xs">⌕</span>
                </div>

                {/* Word Scroll List */}
                <div class="flex-1 overflow-y-auto divide-y divide-slate-900/60 pb-12">
                  {filteredWords.length === 0 ? (
                    <div class="p-12 text-center text-xs text-slate-600 mono">검색 조건에 맞는 단어가 없습니다.</div>
                  ) : filteredWords.map((item, idx) => {
                    const isM = memorized.has(item.id);
                    const isB = bookmarked.has(item.id);
                    return (
                      <div key={item.id}
                        onClick={() => { setCurrentIndex(idx); setShowMeaning(true); setActiveTab("card"); }}
                        class="p-3.5 cursor-pointer flex items-center justify-between bg-[#0b0f19] hover:bg-[#0f1626] active:bg-[#0f1626] transition-colors">
                        <div class="min-w-0 pr-4">
                          <div class="flex items-center gap-1.5">
                            <span class="text-[10px] mono text-slate-600">{item.id}.</span>
                            <span class={`font-bold text-sm tracking-tight ${isM ? "text-slate-600 line-through decoration-slate-700" : "text-slate-200"}`}>{item.word}</span>
                          </div>
                          <p class={`text-xs mt-1 truncate ${isM ? "text-slate-600" : "text-slate-400"}`}>{item.meaning}</p>
                        </div>
                        <div class="flex gap-2" onClick={e => e.stopPropagation()}>
                          <button onClick={() => toggleBookmark(item.id)}
                            class={`p-2 text-sm transition-colors rounded-lg ${isB ? "text-amber-400 bg-amber-500/5" : "text-slate-700"}`}>★</button>
                          <button onClick={() => toggleMemorized(item.id)}
                            class={`p-2 text-sm transition-colors rounded-lg ${isM ? "text-sky-400 bg-sky-500/5" : "text-slate-700"}`}>✔</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* 2. CARD STUDY TAB (WITH SCROLLABLE ETYMO) */}
            {activeTab === "card" && (
              <div class="h-full flex flex-col p-4 justify-between overflow-y-auto pb-16 fade-in">
                
                {/* Card Settings Bar */}
                <div class="flex-shrink-0 flex items-center justify-between bg-[#0e1526] border border-slate-800/60 rounded-xl px-3 py-1.5 mb-3">
                  <div class="text-[11px] font-bold text-slate-500 mono">
                    CARD <span class="text-sky-400">{currentIndex + 1}</span> / {filteredWords.length}
                  </div>
                  <div class="flex items-center gap-2">
                    <select value={speechRate} onChange={e => setSpeechRate(parseFloat(e.target.value))}
                      class="bg-[#131b2e] text-[10px] mono text-slate-400 rounded border border-slate-800 px-1 py-0.5 focus:outline-none">
                      <option value="0.7">0.7x</option>
                      <option value="0.9">0.9x</option>
                      <option value="1.1">1.1x</option>
                    </select>
                    <button onClick={() => setIsPlaying(p => !p)}
                      class={`px-2.5 py-1 text-[10px] font-bold rounded-md transition-all ${isPlaying ? "bg-rose-600/90 text-white" : "bg-sky-600 text-white"}`}>
                      {isPlaying ? "정지" : "▶ 자동"}
                    </button>
                  </div>
                </div>

                {/* Main Card View Space */}
                <div class="w-full flex flex-col gap-4 items-center justify-start flex-1">
                  {currentWord ? (
                    <React.Fragment>
                      
                      {/* Flip Card Unit */}
                      <div onClick={() => setShowMeaning(p => !p)} class="perspective-1000 w-full max-w-sm h-48 cursor-pointer relative flex-shrink-0">
                        <div class={`w-full h-full duration-300 preserve-3d transition-transform relative ${!showMeaning ? "rotate-y-180" : ""}`}>
                          
                          {/* CARD FRONT (ENGLISH WORD) */}
                          <div class="absolute w-full h-full bg-[#111827] border border-slate-800/80 rounded-2xl flex flex-col justify-between p-4 backface-hidden glow-cyan">
                            <div class="flex justify-between items-center w-full">
                              <span class="text-[9px] mono text-slate-600 font-bold tracking-wider uppercase">ENGLISH WORD</span>
                              <button onClick={e => { e.stopPropagation(); toggleBookmark(currentWord.id); }}
                                class={`text-sm ${bookmarked.has(currentWord.id) ? "text-amber-400" : "text-slate-700"}`}>★</button>
                            </div>
                            <div class="text-center px-2">
                              <h2 class="text-3xl font-black text-white tracking-tight select-all">{currentWord.word}</h2>
                              <p class="text-[10px] text-slate-600 mt-1.5">화면을 탭하면 한국어 뜻 확인</p>
                            </div>
                            <div class="flex justify-center">
                              <button onClick={e => { e.stopPropagation(); playPronunciation(currentWord.word); }}
                                class="px-3 py-1 rounded-full bg-[#1c263b] border border-slate-800 text-sky-400 text-[10px] font-medium active:scale-95 transition-transform">
                                🔊 발음 듣기
                              </button>
                            </div>
                          </div>

                          {/* CARD BACK (KOREAN MEANING) */}
                          <div class="absolute w-full h-full bg-[#0f172a] border border-sky-950 rounded-2xl flex flex-col justify-between p-4 backface-hidden rotate-y-180">
                            <div class="flex justify-between items-center w-full">
                              <span class="text-[9px] mono text-sky-500 font-bold tracking-wider uppercase">MEANING</span>
                              <button onClick={e => { e.stopPropagation(); toggleMemorized(currentWord.id); }}
                                class={`text-xs px-2 py-0.5 rounded border ${memorized.has(currentWord.id) ? "border-sky-500/40 bg-sky-500/10 text-sky-400" : "border-slate-800 text-slate-500"}`}>
                                ✓ {memorized.has(currentWord.id) ? "외웠음" : "미암기"}
                              </button>
                            </div>
                            <div class="text-center px-1">
                              <p class="text-base font-bold text-sky-300 leading-snug break-all">{currentWord.meaning}</p>
                              <button onClick={e => { e.stopPropagation(); playMeaning(currentWord.meaning); }}
                                class="text-[10px] text-slate-600 active:text-slate-400 mt-2 underline decoration-slate-700">🔊 뜻 듣기</button>
                            </div>
                            <p class="text-center text-[9px] text-slate-700">다시 탭하면 영단어가 노출됩니다</p>
                          </div>

                        </div>
                      </div>

                      {/* Mobile Optimized Etymology Info Display Card */}
                      <div class="w-full max-w-sm bg-[#0e1526] border border-slate-800/80 rounded-xl p-4 text-left glow-cyan">
                        <div class="flex items-center gap-1.5 mb-2.5">
                          <span class="w-1.5 h-1.5 rounded-full bg-sky-500 animate-pulse"></span>
                          <span class="text-[9px] uppercase mono font-black tracking-widest text-sky-400">어원 분석 입체 학습</span>
                        </div>
                        
                        <div class="space-y-3">
                          {/* Prefix & Root Badges */}
                          <div class="flex flex-wrap gap-1 text-[10px] font-medium">
                            <span class="px-2 py-0.5 bg-[#131b2e] rounded-md text-slate-300 border border-slate-800 mono">
                              형태: <b class="text-sky-400 font-semibold">{currentWord.prefix || "단일어원"}</b>
                            </span>
                            {currentWord.root && (
                              <span class="px-2 py-0.5 bg-[#131b2e] rounded-md text-slate-300 border border-slate-800 mono">
                                어근: <b class="text-cyan-400 font-semibold">{currentWord.root}</b>
                              </span>
                            )}
                          </div>

                          {/* Story Narrative */}
                          <p class="text-slate-300 text-xs leading-relaxed font-normal bg-[#0b0f19]/40 p-2 rounded-lg border border-slate-900/50">
                            {currentWord.story || "단어 원본 고유 구조 표제어입니다."}
                          </p>

                          {/* Cognates Block */}
                          {currentWord.related && (
                            <div class="pt-2 border-t border-slate-900">
                              <span class="text-[9px] font-bold text-amber-500 uppercase tracking-wider mono block mb-1">어근 공유 동계어 (Cognates)</span>
                              <div class="text-[11px] text-slate-400 mono leading-relaxed bg-[#131b2e] p-2 rounded-lg border border-slate-800">
                                {currentWord.related}
                              </div>
                            </div>
                          )}
                        </div>
                      </div>

                    </React.Fragment>
                  ) : (
                    <div class="text-center p-6 bg-[#0e1526] border border-slate-800 rounded-xl w-full max-w-xs">
                      <p class="text-slate-500 text-xs mb-2">선택된 단어가 없습니다.</p>
                      <button onClick={() => { setFilterMode("all"); setSearchQuery(""); }}
                        class="text-xs text-sky-400 font-bold underline">필터 초기화</button>
                    </div>
                  )}
                </div>

                {/* Card Navigation Controls */}
                <div class="flex items-center justify-between gap-3 w-full max-w-sm mx-auto mt-4">
                  <button onClick={handlePrev} disabled={filteredWords.length <= 1}
                    class="flex-1 py-2.5 rounded-xl bg-[#131b2e] border border-slate-800 hover:border-slate-700 active:scale-95 text-slate-300 text-xs font-bold transition-all disabled:opacity-20">
                    이전 단어
                  </button>
                  <button onClick={handleNext} disabled={filteredWords.length <= 1}
                    class="flex-1 py-2.5 rounded-xl bg-sky-600 active:scale-95 text-white text-xs font-bold transition-all disabled:opacity-20 shadow-lg shadow-sky-600/10">
                    다음 단어
                  </button>
                </div>
              </div>
            )}

          </div>

          {/* BOTTOM GLOBAL MOBILE TAB BAR */}
          <div class="flex-shrink-0 bg-[#0f172a] border-t border-slate-800 flex justify-around pb-safe z-50">
            <button onClick={() => { setActiveTab("list"); setIsPlaying(false); }}
              class={`flex-1 py-3 flex flex-col items-center justify-center gap-0.5 transition-colors ${activeTab === "list" ? "text-sky-400 bg-sky-950/10 font-bold" : "text-slate-500"}`}>
              <span class="text-base">📋</span>
              <span class="text-[10px]">단어 목록</span>
            </button>
            <button onClick={() => { setActiveTab("card"); setShowMeaning(true); }}
              class={`flex-1 py-3 flex flex-col items-center justify-center gap-0.5 transition-colors ${activeTab === "card" ? "text-sky-400 bg-sky-950/10 font-bold" : "text-slate-500"}`}>
              <span class="text-base">🃏</span>
              <span class="text-[10px]">카드 학습</span>
            </button>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
