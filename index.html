<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고등 BASIC 어원 단어장 (23~24강)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 아코디언 애니메이션 */
        .accordion-content { transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s ease, opacity 0.3s ease; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 350px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem; }
        
        /* 플래시카드 3D 애니메이션 */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.65s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* 액티브 탭 스타일 */
        .tab-btn.active { color: #0284c7; border-bottom-color: #0284c7; font-weight: 800; background-color: #f0f9ff; }

        /* 모바일 컨테이너 */
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 4px 25px rgba(0,0,0,0.06); }
    </style>
</head>
<body>

<div class="app-container flex flex-col h-screen overflow-hidden">
    
    <!-- 상단 헤더 -->
    <header class="bg-slate-800 text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-lg rounded-b-xl">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight"><i class="fa-solid fa-graduation-cap text-sky-400 mr-2"></i>메타인지 단어장</h1>
            <p class="text-xs text-slate-300 mt-1 font-medium">워드마스터 고등 BASIC (23강~24강)</p>
        </div>
        <button onclick="toggleMode()" id="modeToggleBtn" class="bg-slate-700 text-sky-300 px-3 py-1.5 rounded-full text-sm font-bold shadow-md hover:bg-slate-600 transition border border-slate-600">
            <i class="fa-solid fa-layer-group mr-1"></i> 카드모드
        </button>
    </header>

    <!-- 탭 네비게이션 -->
    <div class="flex bg-white shadow-sm sticky top-[72px] z-10 border-b border-slate-200">
        <button id="tab-23" onclick="setLesson(23)" class="tab-btn active flex-1 py-3.5 text-sm text-slate-500 border-b-2 border-transparent transition duration-200"><i class="fa-solid fa-book-open-reader mr-1"></i> 23강 (40단어)</button>
        <button id="tab-24" onclick="setLesson(24)" class="tab-btn flex-1 py-3.5 text-sm text-slate-500 border-b-2 border-transparent transition duration-200"><i class="fa-solid fa-book-bookmark mr-1"></i> 24강 (40단어)</button>
    </div>

    <!-- 리스트 뷰 영역 -->
    <main id="listView" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24 bg-slate-50">
        <!-- JS 렌더링 -->
    </main>

    <!-- 플래시카드 뷰 영역 -->
    <div id="flashcardView" class="hidden absolute inset-0 bg-slate-900 bg-opacity-95 z-30 flex-col pb-10">
        <div class="flex justify-between items-center p-5 text-white">
            <span id="flashcardCounter" class="text-sm font-bold bg-slate-800 px-4 py-1.5 rounded-full border border-slate-600 text-sky-300 shadow-inner">1 / 40</span>
            <button onclick="toggleMode()" class="text-slate-400 hover:text-white transition transform hover:rotate-90"><i class="fa-solid fa-xmark text-3xl"></i></button>
        </div>

        <div class="flex-1 flex items-center justify-center p-6 w-full perspective-1000">
            <div id="flashcard" class="w-full h-[65vh] max-w-sm relative transform-style-3d flip-card-inner cursor-pointer" onclick="flipCard()">
                
                <!-- 앞면 (단어) -->
                <div class="absolute inset-0 w-full h-full bg-white rounded-3xl shadow-2xl backface-hidden flex flex-col justify-center items-center p-8 text-center border-b-8 border-sky-500">
                    <span id="cardGroup" class="absolute top-6 text-[0.7rem] font-bold text-sky-800 bg-sky-100 px-3 py-1.5 rounded-full border border-sky-200 shadow-sm">그룹</span>
                    <h2 id="cardWord" class="text-4xl font-black text-slate-800 mb-4 tracking-tight break-words">Word</h2>
                    <p class="text-slate-400 text-sm mt-6 font-semibold animate-pulse"><i class="fa-solid fa-hand-pointer mr-2"></i>카드를 눌러 어원 보기</p>
                </div>

                <!-- 뒷면 (뜻 & 어원) -->
                <div class="absolute inset-0 w-full h-full bg-slate-800 rounded-3xl shadow-2xl backface-hidden rotate-y-180 flex flex-col p-6 text-white overflow-y-auto border-b-8 border-slate-950">
                    <h2 id="cardWordBack" class="text-2xl font-bold mb-2 border-b border-slate-600 pb-2 text-sky-300">Word</h2>
                    <p id="cardMeaning" class="text-2xl font-black mb-5 text-white">의미</p>
                    
                    <div class="bg-slate-900 bg-opacity-70 rounded-xl p-4 mb-4 shadow-inner border border-slate-700">
                        <p class="text-[0.7rem] text-sky-400 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-lightbulb mr-1"></i> 어원의 비밀 (Semantic Shift)</p>
                        <p id="cardRoot" class="text-[0.9rem] leading-relaxed text-slate-200 font-medium">어원 설명</p>
                    </div>
                    
                    <div class="bg-slate-900 bg-opacity-70 rounded-xl p-4 shadow-inner border border-slate-700">
                        <p class="text-[0.7rem] text-emerald-400 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-link mr-1"></i> 동계어 (Family)</p>
                        <p id="cardCognates" class="text-sm font-bold text-emerald-100">동계어 설명</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-center items-center space-x-8 px-6 pb-4">
            <button onclick="prevCard()" class="w-16 h-16 rounded-full bg-slate-700 text-white flex justify-center items-center active:bg-slate-600 hover:bg-slate-600 transition transform active:scale-90 shadow-lg border border-slate-600">
                <i class="fa-solid fa-chevron-left text-2xl"></i>
            </button>
            <button onclick="nextCard()" class="w-16 h-16 rounded-full bg-sky-500 text-white flex justify-center items-center active:bg-sky-400 hover:bg-sky-400 transition transform active:scale-90 shadow-[0_0_20px_rgba(14,165,233,0.4)]">
                <i class="fa-solid fa-chevron-right text-2xl"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const db = {
        // ==========================================
        // 23강 (40단어)
        // ==========================================
        23: [
            // [1. 변화와 흔적]
            { word: "transform", meaning: "변형시키다, 바꾸다", root: "trans(가로질러) + form(형태) → 번데기가 나비가 되듯, 한 형태에서 저쪽 너머의 전혀 다른 형태로 껍질을 깨고 '완전히 바꾸고 변형시키다'.", cognates: "transfer(이동하다), format(형식)", group: "1. 변화와 흔적" },
            { word: "fossil", meaning: "화석", root: "fodere(파다) → 원래는 '땅에서 파낸 광물'을 모두 뜻했지만, 점차 의미가 좁아져 땅속에서 파낸 아주 오래된 '동식물의 굳어진 유해나 흔적(화석)'을 가리키게 됨.", cognates: "fosse(해자)", group: "1. 변화와 흔적" },
            { word: "leak", meaning: "누설하다, 새다; 새는 곳", root: "leka(물방울이 맺히다) → 물을 담은 그릇에 미세한 틈이 생겨 액체가 한 방울씩 '새는' 것. 여기서 발전하여 비밀스러운 정보가 밖으로 줄줄 '누설되다'로 뜻이 확장됨.", cognates: "lack(부족하다 - 연관)", group: "1. 변화와 흔적" },
            { word: "accumulate", meaning: "축적하다, 모으다", root: "ad(~에) + cumul(쌓다) → 산 정상에 눈이 한 겹씩 덮이듯, 한 곳에 물건이나 돈, 먼지 등을 계속해서 더하여 산더미처럼 '쌓고 모으다'.", cognates: "cumulus(적운, 뭉게구름)", group: "1. 변화와 흔적" },
            { word: "wasteful", meaning: "낭비하는, 헛된", root: "waste(황폐한, 낭비) + ful → 기름진 땅이 쓸모없는 사막(황무지)으로 변해버리듯, 돈이나 자원을 헛되이 펑펑 써버려 완전히 '낭비하는'.", cognates: "waste(버리다, 쓰레기)", group: "1. 변화와 흔적" },
            { word: "discard", meaning: "버리다, 폐기하다", root: "dis(버리다) + card(카드) → 카드 게임에서 승산이 없는 필요 없는 패를 뽑아서 손에서 '버리는 행위'에서 유래하여 일반적인 쓰레기를 '폐기하다'로 확장.", cognates: "card(카드)", group: "1. 변화와 흔적" },
            { word: "raw", meaning: "날것의, 가공하지 않은", root: "고대영어 hreaw (가공되지 않은) → 공장에서 열을 가해 익히거나 기계로 자르고 붙이지 않은, 자연에서 막 가져온 순수하고 '가공되지 않은' 상태.", cognates: "-", group: "1. 변화와 흔적" },
            { word: "wrap", meaning: "싸다, 포장하다", root: "고대영어 wlappen (감싸다) → 소중한 물건이나 음식이 상하지 않도록 종이나 헝겊을 이용해 주변을 빙 둘러 둥글게 '감싸고 포장하는' 행동.", cognates: "lap(무릎, 감싸다)", group: "1. 변화와 흔적" },

            // [2. 미디어와 소통]
            { word: "audience", meaning: "청중, 관중, 시청자", root: "aud(듣다) + ience → 눈으로만 보는 것이 아니라, 강연자의 목소리나 음악을 귀 기울여 '듣기 위해 한 장소에 모여든 사람들(청중)'.", cognates: "audio(오디오), audition(오디션)", group: "2. 미디어와 소통" },
            { word: "announce", meaning: "발표하다, 알리다", root: "ad(향하여) + nuntiare(소식을 전하다) → 숨기지 않고 사람들을 향해(ad) 중요한 소식이나 정보를 큰 소리로 당당하게 '알리다'.", cognates: "pronounce(발음하다), noun(명사)", group: "2. 미디어와 소통" },
            { word: "medium", meaning: "매체, 수단, 방법; 중간의", root: "med(중간) → 나와 너, 혹은 사건과 대중의 양쪽 끝 사이 딱 '중간'에 끼어서, 소식(정보)을 안전하게 이어주고 전달해 주는 다리 같은 '매개체'.", cognates: "middle(중간), mediate(중재하다)", group: "2. 미디어와 소통" },
            { word: "brief", meaning: "간결한, 짧은; 요약하다", root: "brevis(짧은) → 구구절절 길게 늘어놓지 않고, 뼈대만 남겨 핵심적인 내용만 아주 '짧고 간결하게' 말하거나 정리하는 것.", cognates: "abbreviate(축약하다)", group: "2. 미디어와 소통" },
            { word: "viewer", meaning: "시청자, 관객", root: "view(보다) + er → 영화관 스크린이나 텔레비전 화면 앞에서, 송출되는 영상과 이미지를 두 눈을 뜨고 집중해서 '지켜보는 사람'.", cognates: "view(시야, 보다)", group: "2. 미디어와 소통" },
            { word: "broadcast", meaning: "방송하다, 널리 알리다", root: "broad(넓게) + cast(던지다) → 옛날 농부가 밭에 씨앗을 넓게 흩뿌리던 것에서 유래. 전파라는 씨앗을 사방으로 '넓게 던져 여러 사람에게 방송하다'.", cognates: "broad(넓은), cast(던지다)", group: "2. 미디어와 소통" },
            { word: "convey", meaning: "전(달)하다, 운반하다", root: "con(함께) + via(길) → 소중한 물건이나 마음속 깊은 진심을, 끊어지지 않고 쭉 이어지는 '하나의 길을 따라 무사히 전달하고 운반하다'.", cognates: "convoy(호송하다), via(~을 경유하여)", group: "2. 미디어와 소통" },
            { word: "respondent", meaning: "응답자", root: "re(다시) + spond(대답하다) + ent → 설문지나 질문을 던졌을 때, 침묵하지 않고 자신의 의견을 '다시 돌려보내어 대답해 주는 사람'.", cognates: "respond(반응하다), sponsor(후원자)", group: "2. 미디어와 소통" },
            { word: "informative", meaning: "정보를 주는, 유익한", root: "in(안으로) + form(형태) + ative → 텅 빈 머릿속에 지식의 뼈대와 '형태를 잡아줄' 만큼, 알찬 지식과 '정보가 가득하여 유익한'.", cognates: "inform(알리다), information(정보)", group: "2. 미디어와 소통" },
            { word: "commercial", meaning: "상업의, 상업적인; 광고", root: "com(함께) + merc(거래하다) → 예술이나 순수한 목적이 아니라, 시장에서 사람들과 물건을 사고팔아 돈을 벌기 위한 '상업적인' 속성이나 '광고'.", cognates: "commerce(상업), merchant(상인)", group: "2. 미디어와 소통" },
            { word: "column", meaning: "칼럼, 기둥", root: "columna(기둥) → 거대한 신전을 받치는 둥근 '기둥'처럼, 신문이나 잡지에서 세로로 길게 내려쓴 글의 모양이 기둥을 닮았다고 하여 부르는 기사.", cognates: "colossal(거대한)", group: "2. 미디어와 소통" },

            // [3. 물리적 형태와 상태]
            { word: "steep", meaning: "가파른, 급격한", root: "고대영어 steap (높이 솟은) → 완만하게 걷기 편한 길이 아니라, 롤러코스터처럼 산이나 계단이 너무 높이 솟아올라 오르내리기 아찔하고 '가파른'.", cognates: "-", group: "3. 물리적 형태와 상태" },
            { word: "pile", meaning: "더미, 쌓아 놓은 것", root: "pila(기둥, 돌더미) → 물건을 바닥에 어지럽게 널어두는 것이 아니라, 마치 하나의 둥근 기둥처럼 위를 향해 차곡차곡 '쌓아 올린 무더기'.", cognates: "pillar(기둥)", group: "3. 물리적 형태와 상태" },
            { word: "evident", meaning: "분명한, 눈에 띄는", root: "e(밖으로) + vid(보다) + ent → 짙은 안개 속에 꽁꽁 숨어있던 산봉우리가 밖으로 훤히 제 모습을 드러내어 두 눈에 띄게 '보이니', 의심할 여지 없이 '분명한'.", cognates: "video(비디오), evidence(증거)", group: "3. 물리적 형태와 상태" },
            { word: "mobile", meaning: "움직이기 쉬운, 기동성의", root: "mov(움직이다) + ible → 커다랗고 무거운 데스크탑 컴퓨터와 달리, 내 몸을 따라 어디든 가볍게 '이동하며 움직일 수 있는(휴대폰 등)'.", cognates: "move(움직이다), motion(동작)", group: "3. 물리적 형태와 상태" },
            { word: "surface", meaning: "표면, 외관; 드러나다", root: "sur(위에) + face(얼굴) → 물체의 가장 바깥쪽, 껍질처럼 우리를 정면으로 마주 보는 '윗면이나 표면'. (물속에 잠겼던 것이 수면 위로 '드러나다'의 뜻도 가짐)", cognates: "surpass(능가하다), face(얼굴)", group: "3. 물리적 형태와 상태" },
            { word: "visible", meaning: "(눈에) 보이는", root: "vis(보다) + ible → 현미경이 필요할 정도로 너무 작거나, 유령처럼 투명하지 않아서 우리의 두 눈으로 직접 뚜렷하게 '볼 수 있는'.", cognates: "vision(시야), invisible(보이지 않는)", group: "3. 물리적 형태와 상태" },
            { word: "fabric", meaning: "직물, 천, 구조", root: "fabrica(작업장, 구조물) → 장인이 베틀(작업장)에 앉아 실의 가로세로를 촘촘하게 엮어 튼튼하게 만들어낸 '직물(천)'이자 건물의 '기본 구조'.", cognates: "fabricate(제조하다, 조작하다)", group: "3. 물리적 형태와 상태" },
            { word: "portable", meaning: "휴대용의, 이동이 쉬운", root: "port(나르다) + able → 덩치가 크거나 콘센트가 묶여있지 않아, 언제든 가방에 쏙 넣고 손쉽게 밖으로 '나를(휴대할) 수 있는'.", cognates: "export(수출하다), import(수입하다)", group: "3. 물리적 형태와 상태" },
            { word: "incline", meaning: "경사지다; (마음이) 기울다", root: "in(안으로/쪽으로) + clin(기울다) → 평평했던 땅이 언덕이 되어 한쪽으로 경사지거나, 결정을 못 하던 사람의 마음이 슬그머니 어느 한쪽으로 '기울어지다'.", cognates: "decline(거절하다), recline(기대다)", group: "3. 물리적 형태와 상태" },

            { word: "pollution", meaning: "오염", root: "pol(더럽히다) + lut(씻다) → 본래 맑고 투명하게 씻겨 있던 강물이나 공기를, 공장 폐수나 매연 같은 오물로 검게 '더럽히는 끔찍한 행위'.", cognates: "pollute(오염시키다)", group: "4. 한계와 환경" },
            { word: "threaten", meaning: "위협하다, 협박하다", root: "threat(위협) + en(동사화) → 칼을 들이밀며 나쁜 짓을 하겠다고 무서운 말이나 행동으로 상대방을 코너로 몰고 가며 '협박하다'.", cognates: "threat(위협)", group: "4. 한계와 환경" },

            { word: "sweep", meaning: "쓸다, 휩쓸다", root: "고대영어 swapan (돌진하다) → 빗자루로 바닥을 훔치거나, 태풍이 거센 바람으로 마을의 나무와 지붕을 한꺼번에 무섭게 훅 '쓸어버리다'.", cognates: "swoop(급강하하다)", group: "1. 자연과 환경" },

            { word: "fragile", meaning: "부서지기 쉬운, 취약한", root: "frag(부수다) + ile(하기 쉬운) → 튼튼한 강철이 아니라, 얇은 유리잔이나 잘 구워진 쿠키처럼 톡 하고 살짝만 건드려도 바스락 '부서지기 쉬운'.", cognates: "fragment(파편), fraction(분수)", group: "1. 자연과 환경" },

            { word: "stamp", meaning: "우표, 도장; 날인하다", root: "고대영어 stampian (쾅쾅 밟다) → 옛날 사람들이 분노하여 발을 바닥에 쾅 구르듯, 종이 위에 잉크 묻힌 도장이나 우표를 '쾅 하고 억눌러 찍는 행위'.", cognates: "stomp(쿵쿵거리며 걷다)", group: "2. 소통과 전달" },

            { word: "diminish", meaning: "감소하다, 약화시키다", root: "di(완전히) + min(작은) + ish → 한때 하늘을 찌르던 명성이나 거대한 권력이, 세월이 흘러 원래보다 훨씬 '더 작게 쪼그라들고 초라해지도록 만들다'.", cognates: "mini(작은), minute(분, 미세한)", group: "3. 경제와 자원" },
            { word: "resource", meaning: "자원, 물자", root: "re(다시) + source(솟아나다) → 깊은 산속 옹달샘에서 물을 푹푹 퍼내어 마셔도, 바닥나지 않고 '다시(re) 퐁퐁 솟아오르는' 샘물과 같은 귀중한 천연가스나 인력.", cognates: "source(원천)", group: "3. 경제와 자원" },
            { word: "remain", meaning: "남아 있다", root: "re(뒤에) + main(머무르다) → 파티가 끝나고 친구들은 모두 각자의 집으로 떠나버렸는데, 나 혼자만 그 자리를 떠나지 못하고 고독하게 '뒤에 남아 머무르다'.", cognates: "mansion(대저택), permanent(영구적인)", group: "3. 경제와 자원" },
            { word: "utilize", meaning: "활용하다, 이용하다", root: "util(유용한) + ize(~하게 하다) → 창고에 먼지 쌓인 채 방치된 물건이나 내가 배운 지식을 썩히지 않고, 내 삶의 목적에 맞게 아주 '쓸모 있게 써먹다'.", cognates: "utility(공익사업, 유용성)", group: "3. 경제와 자원" },
            { word: "suitable", meaning: "적절한, 적합한", root: "suit(맞다) + able → 텅 빈 퍼즐 판에 남은 한 조각이 제자리에 쏙 들어가듯, 그날의 날씨나 면접관의 기준에 아주 '찰떡같이 꼭 들어맞는'.", cognates: "suit(정장, 어울리다)", group: "3. 경제와 자원" },
            { word: "generate", meaning: "발생시키다, 만들어 내다", root: "gen(낳다, 종족) + ate → 발전소 터빈을 돌려 엄청난 전기를 만들어내거나, 천재적인 발명가가 새로운 아이디어를 생명체처럼 무에서 유로 '낳아(발생) 시키다'.", cognates: "generation(세대), gene(유전자)", group: "3. 경제와 자원" },
            { word: "convert", meaning: "전환하다, 바꾸다", root: "con(완전히) + vert(돌리다) → 눈에 안 보이는 가스 형태를 찰랑이는 액체로, 혹은 내가 믿던 종교를 다른 쪽으로 '완전히 180도 방향을 돌려 뒤바꾸다'.", cognates: "invert(뒤집다), reverse(반대의)", group: "3. 경제와 자원" },
            { word: "lessen", meaning: "줄다, 완화시키다", root: "less(더 적은) + en(동사화) → 진통제를 먹어 참을 수 없던 치통을 가라앉히거나, 배낭의 무거운 짐을 빼서 예전보다 훨씬 '더 적고 가볍게 만들어주다'.", cognates: "less(더 적은)", group: "3. 경제와 자원" },

            // [4. 가치와 상태]
            { word: "straw", meaning: "빨대, 지푸라기", root: "streaw(흩뿌려진 것) → 추수 후 텅 빈 채 바닥에 흩뿌려진 밀짚(지푸라기). 옛 사람들이 이 속이 빈 짚의 줄기를 잘라 음료를 빨아 마신 것에서 '빨대'가 됨.", cognates: "strew(흩뿌리다)", group: "4. 가치와 상태" },
            { word: "satellite", meaning: "(인공)위성", root: "satelles(경호원, 수행원) → 달이 거대한 지구를 지키듯, 거대한 행성 주변을 밤낮없이 뱅글뱅글 맴돌며 곁을 지키고 호위하는 '우주의 경호원(위성)'.", cognates: "-", group: "4. 가치와 상태" },
            { word: "cherish", meaning: "소중히 하다", root: "carus(값비싼, 소중한) → 남들은 잡동사니라 부를지라도, 내게는 첫사랑의 편지처럼 너무나 가치 있어서 가슴속 깊이 품고 아주 '소중하게 여기다'.", cognates: "charity(자선, 사랑), caress(애무하다)", group: "4. 가치와 상태" },
            { word: "affair", meaning: "일, 문제, 사건", root: "ad(~로) + facere(하다) → 남의 일이라 뒷짐 지고 구경할 수 없고, 결국 내가 내 발로 직접 앞으로 뛰어들어서 '처리해야만 하는 복잡한 일이나 스캔들'.", cognates: "factory(공장), affect(영향을 미치다)", group: "4. 가치와 상태" },
            { word: "appealing", meaning: "매력적인, 흥미를 끄는", root: "ad(~에) + pel(부르다, 밀다) + ing → 길거리를 지나가는 사람들의 무관심한 시선이나 마음을, 자기 쪽으로 강력한 자석처럼 확 '끌어당기며 매혹적인'.", cognates: "appeal(호소하다), compel(강요하다)", group: "4. 가치와 상태" },

            // [5. 행동과 구동사]
            { word: "feel free to do", meaning: "자유롭게 [마음대로] ~하다", root: "free(자유로운) → 윗사람의 눈치를 살피며 쭈뼛거리지 말고, 마치 하늘을 나는 새 깃털처럼 가볍고 편안한 '자유로운 마음으로 거리낌 없이 ~하다'.", cognates: "free(자유로운), freedom(자유)", group: "5. 행동과 구동사" }
        ]
    };

    let currentLesson = 23;
    let currentCardIndex = 0;
    let isFlipped = false;
    let currentFlatWordList = [];

    // 단원 설정
    function setLesson(lessonNumber) {
        currentLesson = lessonNumber;
        currentCardIndex = 0;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.classList.replace('text-sky-600', 'text-slate-500');
            btn.classList.replace('border-sky-600', 'border-transparent');
            btn.classList.remove('bg-sky-50');
        });
        const activeTab = document.getElementById(`tab-${lessonNumber}`);
        activeTab.classList.add('active');
        activeTab.classList.replace('text-slate-500', 'text-sky-600');
        activeTab.classList.replace('border-transparent', 'border-sky-600');
        activeTab.classList.add('bg-sky-50');

        renderList();
    }

    // 리스트 렌더링
    function renderList() {
        const listView = document.getElementById('listView');
        let htmlContent = '';
        
        const words = db[currentLesson];
        currentFlatWordList = words;

        const groupedData = words.reduce((acc, word) => {
            if (!acc[word.group]) acc[word.group] = [];
            acc[word.group].push(word);
            return acc;
        }, {});

        let globalWordIndex = 0;

        for (const [groupName, groupWords] of Object.entries(groupedData)) {
            htmlContent += `
                <div class="mb-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-slate-100 border-b border-slate-200 py-2.5 px-4">
                        <h2 class="text-[0.8rem] font-bold text-slate-700 tracking-wide"><i class="fa-solid fa-bookmark text-sky-500 mr-2"></i>${groupName}</h2>
                    </div>
                    <div class="divide-y divide-slate-100">
            `;
            
            groupWords.forEach((item, index) => {
                const id = `word-${currentLesson}-${globalWordIndex++}`;
                htmlContent += `
                    <div>
                        <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors" onclick="toggleAccordion('${id}')">
                            <div class="pr-4">
                                <h3 class="text-[1.1rem] font-bold text-slate-800">${item.word}</h3>
                                <p class="text-sm font-medium text-slate-500 mt-0.5">${item.meaning}</p>
                            </div>
                            <div class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-400 shrink-0">
                                <i id="icon-${id}" class="fa-solid fa-chevron-down text-sm transition-transform duration-300"></i>
                            </div>
                        </div>
                        
                        <div id="content-${id}" class="accordion-content bg-slate-50 px-5">
                            <div class="mb-4">
                                <span class="inline-block bg-sky-100 text-sky-800 text-[0.7rem] px-2 py-1 rounded-md font-bold mb-2 shadow-sm border border-sky-200">
                                    <i class="fa-solid fa-wand-magic-sparkles mr-1"></i>어원의 비밀
                                </span>
                                <p class="text-sm text-slate-700 leading-relaxed font-medium break-keep">${item.root}</p>
                            </div>
                            <div class="pb-2">
                                <span class="inline-block bg-emerald-100 text-emerald-800 text-[0.7rem] px-2 py-1 rounded-md font-bold mb-1 border border-emerald-200">
                                    <i class="fa-solid fa-network-wired mr-1"></i>동계어 (Family)
                                </span>
                                <p class="text-sm text-slate-600 font-semibold pl-1">${item.cognates}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div></div>`;
        }
        listView.innerHTML = htmlContent;
        updateFlashcard();
    }

    function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.classList.remove('rotate-180');
        } else {
            // 다른 열린 아코디언 닫기 (옵션)
            // document.querySelectorAll('.accordion-content.open').forEach(el => el.classList.remove('open'));
            // document.querySelectorAll('.fa-chevron-down.rotate-180').forEach(el => el.classList.remove('rotate-180'));
            
            content.classList.add('open');
            icon.classList.add('rotate-180');
        }
    }

    function toggleMode() {
        const flashcardView = document.getElementById('flashcardView');
        const modeBtn = document.getElementById('modeToggleBtn');
        
        if (flashcardView.classList.contains('hidden')) {
            flashcardView.classList.remove('hidden');
            flashcardView.classList.add('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-list mr-1"></i> 목록보기';
            updateFlashcard();
        } else {
            flashcardView.classList.add('hidden');
            flashcardView.classList.remove('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-layer-group mr-1"></i> 카드모드';
        }
    }

    function updateFlashcard() {
        const item = currentFlatWordList[currentCardIndex];
        document.getElementById('cardGroup').innerText = `${currentLesson}강 - ${item.group.substring(3)}`;
        document.getElementById('cardWord').innerText = item.word;
        document.getElementById('cardWordBack').innerText = item.word;
        document.getElementById('cardMeaning').innerText = item.meaning;
        document.getElementById('cardRoot').innerText = item.root;
        document.getElementById('cardCognates').innerText = item.cognates;
        
        document.getElementById('flashcardCounter').innerText = `${currentCardIndex + 1} / ${currentFlatWordList.length}`;
        
        if(isFlipped) {
            document.getElementById('flashcard').classList.remove('rotate-y-180');
            isFlipped = false;
        }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        isFlipped = !isFlipped;
        if (isFlipped) {
            card.classList.add('rotate-y-180');
        } else {
            card.classList.remove('rotate-y-180');
        }
    }

    function prevCard() {
        currentCardIndex = (currentCardIndex > 0) ? currentCardIndex - 1 : currentFlatWordList.length - 1;
        updateFlashcard();
    }

    function nextCard() {
        currentCardIndex = (currentCardIndex < currentFlatWordList.length - 1) ? currentCardIndex + 1 : 0;
        updateFlashcard();
    }

    window.onload = () => {
        setLesson(23); // 초기 로드
    };
</script>
</body>
</html>
